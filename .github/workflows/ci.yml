name: CI
on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Install build deps
        run: sudo apt-get update && sudo apt-get install -y liblzma-dev shellcheck
      - name: Run all tests
        run: bash tests/runall.sh
